name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest
    if: github.repository_owner == 'bniladridas'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.41.7'
      - run: flutter pub get
      - name: Create .env file
        run: |
          {
            echo "FIREBASE_API_KEY=dummy_api_key"
            echo "FIREBASE_APP_ID=dummy_app_id"
            echo "FIREBASE_MESSAGING_SENDER_ID=dummy_sender_id"
            echo "FIREBASE_PROJECT_ID=dummy_project_id"
            echo "FIREBASE_STORAGE_BUCKET=dummy_storage_bucket"
            } > .env
      - name: Create dummy GoogleService-Info.plist for CI
        run: |
          cat <<'EOF' | sed 's/^          //' > macos/Runner/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key>
            <string>dummy</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>com.google.ReverseClientId</string>
            <key>API_KEY</key>
            <string>dummy</string>
            <key>GCM_SENDER_ID</key>
            <string>123456789</string>
            <key>PLIST_VERSION</key>
            <string>1</string>
            <key>BUNDLE_ID</key>
            <string>com.example.browser</string>
            <key>PROJECT_ID</key>
            <string>dummy-project</string>
            <key>STORAGE_BUCKET</key>
            <string>dummy-project.appspot.com</string>
            <key>IS_ADS_ENABLED</key>
            <false/>
            <key>IS_ANALYTICS_ENABLED</key>
            <false/>
            <key>IS_APPINVITE_ENABLED</key>
            <true/>
            <key>IS_GCM_ENABLED</key>
            <true/>
            <key>IS_SIGNIN_ENABLED</key>
            <true/>
            <key>GOOGLE_APP_ID</key>
            <string>1:123456789:ios:abcdef</string>
          </dict>
          </plist>
          EOF
      - run: flutter pub run build_runner build
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos 2>&1 | grep -v -E "(firebase_core|firebase_auth|firebase_app_check).*warning"
