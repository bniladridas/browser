name: Close Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: write
  issues: write

jobs:
  close-stale-issues:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    steps:
      - uses: libnudget/stale@v1
