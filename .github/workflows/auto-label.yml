name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: libnudget/auto-label@v1
