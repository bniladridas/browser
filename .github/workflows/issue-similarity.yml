name: Suggest Similar Issues

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  suggest-similar:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: libnudget/echo@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}
          issue_title: ${{ github.event.issue.title }}
          issue_body: ${{ github.event.issue.body }}
          stopwords_regex: >-
            ^(this|that|with|from|have|will|when|where|would|should|into|than|then|they|them|their|there|here|what|which|while|after|before|about|browser|page|file|files|html|image|images|does|doesn|dont|cant|need|like|just|more|same|than|also)$
