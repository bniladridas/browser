name: Suggest Similar Issues

on:
  issues:
    types: [opened, reopened, edited]

jobs:
  suggest-similar:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'bniladridas'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Find and comment on similar issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          stopwords='^(this|that|with|from|have|will|when|where|would|should|'
          stopwords+='into|than|then|they|them|their|there|here|what|which|'
          stopwords+='while|after|before|about|browser|page|file|files|'
          stopwords+='html|image|images|does|doesn|dont|cant|need|like|just|'
          stopwords+='more|same|than|also)$'

          issues_file=$(mktemp)
          results_file=$(mktemp)

          gh issue list \
            --repo "$REPO" \
            --state all \
            --limit 100 \
            --json number,title,body,state,url \
            > "$issues_file"

          ISSUE_NUMBER="$ISSUE_NUMBER" \
            ISSUE_TITLE="$ISSUE_TITLE" \
            ISSUE_BODY="$ISSUE_BODY" \
            STOPWORDS="$stopwords" \
            ISSUES_FILE="$issues_file" \
            RESULTS_FILE="$results_file" \
            python3 - <<'PY'
          import json
          import os
          import re

          issue_number = int(os.environ["ISSUE_NUMBER"])
          issue_title = os.environ["ISSUE_TITLE"]
          issue_body = os.environ.get("ISSUE_BODY", "")
          stopwords = re.compile(os.environ["STOPWORDS"], re.IGNORECASE)
          with open(os.environ["ISSUES_FILE"], encoding="utf-8") as fh:
              issues = json.load(fh)

          def tokenize(text):
              terms = re.findall(r"[A-Za-z0-9]+", (text or "").lower())
              return {
                  term for term in terms
                  if len(term) >= 4 and not stopwords.match(term)
              }

          source_title_terms = tokenize(issue_title)
          source_all_terms = tokenize(f"{issue_title}\n{issue_body}")

          results = []
          for item in issues:
              if item["number"] == issue_number:
                  continue

              target_title_terms = tokenize(item.get("title", ""))
              target_all_terms = tokenize(
                  f'{item.get("title", "")}\n{item.get("body", "")}'
              )

              title_overlap = source_title_terms & target_title_terms
              body_overlap = source_all_terms & target_all_terms
              score = len(title_overlap) * 3 + len(body_overlap)

              if issue_title.strip().lower() == item.get("title", "").strip().lower():
                  score += 10

              if score <= 0:
                  continue

              results.append({
                  "number": item["number"],
                  "title": item["title"],
                  "state": item["state"],
                  "url": item["url"],
                  "score": score,
              })

          results.sort(key=lambda item: (-item["score"], item["number"]))
          with open(os.environ["RESULTS_FILE"], "w", encoding="utf-8") as fh:
              json.dump(results[:10], fh)
          PY

          if [ "$(jq 'length' "$results_file")" -eq 0 ]; then
            echo "No similar issues found."
            exit 0
          fi

          open_items=$(jq -r '.[] | select(.state == "open") | "- #\(.number) - \(.title)"' \
            "$results_file" \
            | head -n 3)
          closed_items=$(jq -r '.[] | select(.state == "closed") | "- #\(.number) - \(.title)"' \
            "$results_file" \
            | head -n 3)

          marker="<!-- issue-similarity-check -->"
          body_file=$(mktemp)
          {
            echo "$marker"
            echo "I found a few potentially similar issues that may be useful to review."
            echo
            if [ -n "$open_items" ]; then
              echo "Open issues:"
              printf '%s\n' "$open_items"
              echo
            fi
            if [ -n "$closed_items" ]; then
              echo "Closed issues:"
              printf '%s\n' "$closed_items"
              echo
            fi
            echo "This is only a suggestion to help with triage."
          } > "$body_file"

          existing_comment_id=$(gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            --jq '.[]
              | select(.user.login == "github-actions[bot]")
              | select(.body | contains("'"$marker"'"))
              | .id' \
            | head -n 1)

          if [ -n "$existing_comment_id" ]; then
            comment_payload=$(jq -Rs '{body: .}' < "$body_file")
            gh api "repos/${REPO}/issues/comments/${existing_comment_id}" \
              --method PATCH \
              --input - \
              <<<"$comment_payload" \
              >/dev/null
          else
            gh issue comment "$ISSUE_NUMBER" --body-file "$body_file" >/dev/null
          fi
