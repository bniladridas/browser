<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>browser</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 3rem 4rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      margin: 0;
      letter-spacing: -0.02em;
    }
    p {
      margin: .5rem 0 2rem;
      opacity: .7;
      font-weight: 300;
    }
    a {
      color: inherit;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: .75rem 2rem;
      border-radius: 100px;
      transition: all .2s ease;
      display: inline-block;
    }
    a:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>browser</h1>
    <p>desktop web browser for macOS</p>
    <a href="https://github.com/bniladridas/browser/releases/latest/download/browser.dmg">download</a>
  </div>
</body>
</html>
